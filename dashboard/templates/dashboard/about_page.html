{% extends "dashboard/base.html" %}

{% block content %}
<div class="row g-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h2 class="h6 mb-3">Kalender Kabinet</h2>
                <form method="post">
                    {% csrf_token %}
                    {% for field in calendar_form %}
                        <div class="mb-3">
                            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {% for error in field.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}
                        </div>
                    {% endfor %}
                    <button class="btn btn-dark" type="submit">Simpan Kalender</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
