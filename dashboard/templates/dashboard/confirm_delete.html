{% extends "dashboard/base.html" %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <p class="mb-3">Anda yakin ingin menghapus <strong>{{ object }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Ya, hapus</button>
            <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
