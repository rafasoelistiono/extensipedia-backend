{% extends "dashboard/base.html" %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <h2 class="h6 mb-3">Advokasi &amp; Literasi Kebijakan Resource Links</h2>
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                {% for field in form %}
                    <div class="col-md-6">
                        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}
                    </div>
                {% endfor %}
            </div>
            <button class="btn btn-dark mt-4" type="submit">Simpan Resource Advokasi</button>
        </form>
    </div>
</div>
{% endblock %}
